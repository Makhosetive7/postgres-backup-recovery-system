name: Daily Backup

on:
  schedule:
    # 01:00 UTC daily
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL || vars.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client (v17)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          pg_dump --version

      - name: Validate required connection settings
        run: |
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "DATABASE_URL is not set. Configure repository secret DATABASE_URL (preferred) or repository variable DATABASE_URL."
            exit 1
          fi

      - name: Run backup
        env:
          BACKUP_DIR: ./backups
        run: |
          chmod +x scripts/backup_full.sh
          ./scripts/backup_full.sh

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: pg-backup-${{ github.run_id }}
          path: backups/backup_*.dump
          retention-days: 7
          if-no-files-found: error
